<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanksystem Profile</title>
    <link rel="icon" type="image/x-icon" href="./assets/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ================= CƠ BẢN ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background-color: #050505;
            color: #dbdee1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: auto;
        }

        /* --- VIDEO NỀN TỔNG QUÁT --- */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* ================= BỐ CỤC CHÍNH ================= */
        .container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            align-items: stretch;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: rgba(17, 18, 20, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border 0.3s ease;
        }

        .glass-card:hover {
            /* Phóng to widget lên 1.02 lần (tăng 2%) */
            transform: scale(1.02);
            /* Phát sáng viền bằng cách dùng box-shadow */
            box-shadow: 0 0 15px rgba(0, 168, 252, 0.5), 0 10px 30px rgba(0, 0, 0, 0.7);
            /* Làm sáng viền lên một chút */
            border: 1px solid rgba(0, 168, 252, 0.5);
        }

        /* ================= CỘT TRÁI: DISCORD PROFILE ================= */
        .left-col {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0;
        }

        /* --- SỬA LẠI KHỐI BANNER CHỨA MP4 --- */
        .banner {
            width: 100%;
            height: 120px;
            position: relative;
            overflow: hidden;
            /* Cắt gọn video không cho tràn ra ngoài 120px */
        }

        .banner-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Ép video phủ kín khung banner */
            position: absolute;
            top: 0;
            left: 0;
        }

        .card-body {
            padding: 0 16px 20px 16px;
            position: relative;
        }

        .avatar-wrapper {
            position: absolute;
            top: -60px;
            left: 16px;
            display: flex;
            align-items: flex-end;
        }

        #discord-avatar {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 6px solid #111214;
            background-color: #2c2f33;
            object-fit: cover;
        }

        .status-bubble {
            background-color: #2b2d31;
            padding: 6px 12px;
            border-radius: 12px;
            border: 4px solid #111214;
            font-size: 0.85rem;
            margin-left: -20px;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: #fff;
            z-index: 3;
        }

        .user-info {
            margin-top: 50px;
        }

        .display-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #f2f3f5;
        }

        .username-pronouns {
            font-size: 0.85rem;
            font-weight: 500;
            color: #b5bac1;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background-color: rgba(255, 255, 255, 0.08);
            margin: 16px 0;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #b5bac1;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .bio-text {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #dbdee1;
            margin-bottom: 10px;
        }

        .connections-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .conn-icon {
            background: rgba(255, 255, 255, 0.05);
            color: #b5bac1;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .conn-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-2px);
        }

        /* ================= CỘT PHẢI: WIDGETS DỌC ================= */
        .right-col {
            flex: 1.5;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 1. Lời chào */
        .welcome-widget {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
        }

        .welcome-widget h3 {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .typing-container {
            font-size: 0.95rem;
            color: #a0a0a0;
            font-style: italic;
            min-height: 20px;
        }

        .cursor {
            display: inline-block;
            color: #fff;
            font-weight: bold;
            animation: blink 0.8s step-end infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* 2. Đồng hồ */
        .clock-widget {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
        }

        #time {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 2px;
            color: #fff;
        }

        #date {
            color: #a0a0a0;
            font-size: 0.85rem;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 3. WIDGET KỸ NĂNG (MARQUEE) */
        .skills-marquee-widget {
            padding: 20px 0;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }

        .skills-marquee-widget::before,
        .skills-marquee-widget::after {
            content: '';
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            z-index: 2;
        }

        .skills-marquee-widget::before {
            left: 0;
            background: linear-gradient(to right, rgba(17, 18, 20, 1), transparent);
        }

        .skills-marquee-widget::after {
            right: 0;
            background: linear-gradient(to left, rgba(17, 18, 20, 1), transparent);
        }

        .marquee-track {
            display: flex;
            gap: 40px;
            animation: scroll-left 15s linear infinite;
        }

        .skills-marquee-widget:hover .marquee-track {
            animation-play-state: paused;
        }

        .marquee-track i {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .marquee-track i:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .about-links {
            display: flex;
            flex-direction: column;
            /* Xếp dọc các link để không bị dính vào nhau */
            gap: 10px;
            /* Khoảng cách giữa các link */
            margin-top: 10px;
        }

        .about-link {
            display: flex;
            align-items: center;
            gap: 10px;
            /* Khoảng cách giữa icon và chữ */
            color: #ffffff;
            /* Màu trắng giúp chữ cực kỳ rõ */
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            /* Nền mờ nhẹ cho mỗi link */
            border-radius: 8px;
            transition: 0.3s;
        }

        .about-link:hover {
            background: rgba(255, 255, 255, 0.15);
            /* Sáng lên khi di chuột */
            color: #00a8fc;
            /* Đổi màu xanh nhẹ khi hover */
        }

        .music-widget {
            padding: 15px;
            display: flex;
            flex-direction: column;
            /* Chuyển thành dạng dọc */
            gap: 12px;
            color: #fff;
        }

        .music-info {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-controls-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .main-controls {
            display: flex;
            gap: 15px;
            font-size: 1rem;
            cursor: pointer;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            font-size: 0.75rem;
            font-family: monospace;
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            background: #444;
            border-radius: 2px;
            appearance: none;
        }

        .music-progress {
            font-family: monospace;
            color: #a0a0a0;
        }

        .music-controls {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 1.2rem;
        }

        #progress-bar {
            margin: 5px 0;
            accent-color: #00a8fc;
        }

        body {
            /* Thay 'pointer' bằng kiểu bạn muốn: auto, crosshair, wait, help... */
            cursor: default;
        }

        /* Khi di chuột vào các phần tử có thể tương tác */
        a,
        button,
        .conn-icon,
        .about-link,
        .main-controls i,
        #progress-bar,
        #click-to-play {
            cursor: pointer;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0a0a0;
        }

        #volume-slider {
            width: 50px;
            /* Độ dài thanh trượt */
            height: 4px;
            cursor: pointer;
            accent-color: #00a8fc;
        }
        /* Responsive cho điện thoại (Màn hình nhỏ hơn 768px) */
@media (max-width: 768px) {
    body {
        /* Cho phép cuộn dọc trên điện thoại */
        overflow-y: auto !important;
        /* Bỏ căn giữa theo chiều dọc nếu trang quá dài */
        align-items: flex-start;
    }

    .container {
        flex-direction: column;
        padding: 10px;
        /* Cho phép container giãn ra theo nội dung */
        height: auto;

    .progress-container {

    }

    .volume-container {
        width: 100%;
        justify-content: center; /* Đưa thanh âm lượng vào giữa */
    }

    #volume-slider {
        width: 100px; /* Tăng chiều rộng thanh âm lượng để dễ kéo hơn */
    }
}
    </style>
</head>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            /* 1. LOGIC ĐỒNG HỒ */
            function updateClock() {
                const now = new Date();
                let hours = now.getHours().toString().padStart(2, '0');
                let minutes = now.getMinutes().toString().padStart(2, '0');
                document.getElementById('time').innerText = `${hours}:${minutes}`;

                const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
                const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                document.getElementById('date').innerText = `${days[now.getDay()]} • ${months[now.getMonth()]} ${now.getDate()}`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            /* 2. LOGIC LẤY DATA DISCORD */
            const DISCORD_USER_ID = "756405530960068628";
            async function fetchDiscordProfile() {
                try {
                    const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
                    const { data, success } = await response.json();
                    if (success && data.discord_user.avatar) {
                        document.getElementById('discord-avatar').src = `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/${data.discord_user.avatar}.png?size=512`;
                    }
                    const customStatus = data.activities.find(activity => activity.type === 4);
                    const bubble = document.getElementById('discord-bubble');
                    if (customStatus && bubble) {
                        bubble.innerHTML = customStatus.state || "";
                        bubble.style.display = 'flex';
                    } else if (bubble) { bubble.style.display = 'none'; }
                } catch (error) { console.error("Lỗi Lanyard:", error); }
            }
            fetchDiscordProfile();
            setInterval(fetchDiscordProfile, 5000);

            /* 3. LOGIC HIỆU ỨNG GÕ CHỮ */
            const phrases = ['Striving for success...', '成功を目指して努力する...', 'Trying to get better...', 'より良くしようとしている'];
            let phraseIndex = 0, charIndex = 0, isDeleting = false;
            const textElement = document.getElementById("typewriter-text");
            function typeEffect() {
                const currentPhrase = phrases[phraseIndex];
                textElement.textContent = currentPhrase.substring(0, charIndex);
                if (isDeleting) charIndex--; else charIndex++;
                let typeSpeed = isDeleting ? 50 : 100;
                if (!isDeleting && charIndex === currentPhrase.length) { typeSpeed = 2000; isDeleting = true; }
                else if (isDeleting && charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; typeSpeed = 500; }
                setTimeout(typeEffect, typeSpeed);
            }
            typeEffect();

            /* 4. LOGIC NHẠC NỀN (ĐÃ FIX LỖI CLICK & TỰ CHUYỂN BÀI) */
            const audio = document.getElementById("bg-music");
            const overlay = document.getElementById("click-to-play");
            const songTitle = document.getElementById("song-title");
            const currentTimeEl = document.getElementById("current-time");
            const durationEl = document.getElementById("duration");
            const playPauseBtn = document.getElementById("play-pause-btn");

            const playlist = [
                { title: "SƠN TÙNG M-TP | MUỘN RỒI MÀ SAO CÒN", file: "./assets/music/SƠN TÙNG M-TP - MUỘN RỒI MÀ SAO CÒN - OFFICIAL MUSIC VIDEO.mp3" },
                { title: "SON TUNG M-TP | MAKING MY WAY", file: "./assets/music/SON TUNG M-TP - MAKING MY WAY - OFFICIAL VISUALIZER.mp3" },
                { title: "SON TUNG M-TP x TYGA | COME MY WAY", file: "./assets/music/SON TUNG M-TP x TYGA - COME MY WAY - OFFICIAL MUSIC VIDEO.mp3" },
                { title: "SƠN TÙNG M-TP | ĐỪNG LÀM TRÁI TIM ANH ĐAU", file: "./assets/music/SƠN TÙNG M-TP - ĐỪNG LÀM TRÁI TIM ANH ĐAU - OFFICIAL MUSIC VIDEO.mp3" }
            ];
            let currentSongIndex = 0;

            window.loadSong = function (index) {
                audio.src = playlist[index].file;
                songTitle.innerText = playlist[index].title;
                audio.play();
                playPauseBtn.className = "fa-solid fa-pause";
            };
            // Hàm điều chỉnh âm lượng
            window.changeVolume = function () {
                const volumeSlider = document.getElementById("volume-slider");
                audio.volume = volumeSlider.value; // Gán giá trị thanh trượt vào âm lượng audio
            };

            window.nextSong = function () {
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                loadSong(currentSongIndex);
            };

            window.prevSong = function () {
                currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
                loadSong(currentSongIndex);
            };

            window.togglePlayPause = function () {
                if (audio.paused) { audio.play(); playPauseBtn.className = "fa-solid fa-pause"; }
                else { audio.pause(); playPauseBtn.className = "fa-solid fa-play"; }
            };

            window.seekSong = function () {
                const progressBar = document.getElementById("progress-bar");
                audio.currentTime = (progressBar.value / 100) * audio.duration;
            };

            overlay.addEventListener("click", () => {
                audio.volume = 0.3;
                loadSong(currentSongIndex);
                overlay.style.display = "none";
            });

            audio.addEventListener("ended", nextSong);

            audio.addEventListener("timeupdate", () => {
                const progressBar = document.getElementById("progress-bar");
                if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100;
                const curMin = Math.floor(audio.currentTime / 60);
                const curSec = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
                currentTimeEl.innerText = `${curMin}:${curSec}`;
                const durMin = Math.floor(audio.duration / 60) || 0;
                const durSec = Math.floor(audio.duration % 60).toString().padStart(2, '0');
                durationEl.innerText = `${durMin}:${durSec}`;
            });
        });
    </script>
</body>

</html>
