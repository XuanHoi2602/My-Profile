<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanksystem Profile</title>
    <link rel="icon" type="image/x-icon" href="./assets/logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ================= CƠ BẢN ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background-color: #050505;
            color: #dbdee1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: auto;
            perspective: 1000px; /* Tạo chiều sâu 3D cho hiệu ứng nghiêng */
        }

        /* --- VIDEO NỀN TỔNG QUÁT --- */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none; 
        }

        /* ================= BỐ CỤC CHÍNH ================= */
        .container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            align-items: stretch;
            position: relative;
            z-index: 1;
        }

        /* Nền trong suốt thủy tinh và hiệu ứng ngả về sau khi hover viền */
        .glass-card {
            background: rgba(15, 17, 21, 0.35); /* Tăng độ trong suốt dạng thủy tinh */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border 0.4s ease;
        }

        .glass-card:hover {
            box-shadow: 0 0 20px rgba(47, 77, 73, 0.6), 0 5px 15px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(47, 77, 73, 0.856);
        }

        /* ================= CỘT TRÁI: DISCORD PROFILE ================= */
        .left-col {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0;
        }

        .banner {
            width: 100%;
            height: 120px;
            position: relative;
            overflow: hidden;
        }

        .banner-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .card-body {
            padding: 0 16px 20px 16px;
            position: relative;
        }

        .avatar-wrapper {
            position: absolute;
            top: -60px;
            left: 16px;
            display: flex;
            align-items: flex-end;
        }

        #discord-avatar {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 6px solid #111214;
            background-color: #2c2f33;
            object-fit: cover;
        }

        .status-bubble {
            background-color: rgba(43, 45, 49, 0.6);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 12px;
            border: 4px solid #111214;
            font-size: 0.85rem;
            margin-left: -20px;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: #fff;
            z-index: 3;
        }

        .user-info {
            margin-top: 50px;
        }

        .display-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #f2f3f5;
        }

        .username-pronouns {
            font-size: 0.85rem;
            font-weight: 500;
            color: #b5bac1;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background-color: rgba(255, 255, 255, 0.08);
            margin: 16px 0;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #b5bac1;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .bio-text {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #dbdee1;
            margin-bottom: 10px;
        }

        .connections-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .conn-icon {
            background: rgba(255, 255, 255, 0.05);
            color: #b5bac1;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .conn-icon:hover {
            background: rgba(47, 77, 73, 0.856);
            color: #fff;
            transform: translateY(-2px);
        }

        /* ================= CỘT PHẢI: WIDGETS NGANG ================= */
        .right-col {
            flex: 1.5;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 1. Lời chào */
        .welcome-widget {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
        }

        .welcome-widget h3 {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .typing-container {
            font-size: 0.95rem;
            color: #a0a0a0;
            font-style: italic;
            min-height: 20px;
        }

        .cursor {
            display: inline-block;
            color: #fff;
            font-weight: bold;
            animation: blink 0.8s step-end infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* 2. Đồng hồ */
        .clock-widget {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
        }

        #time {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 2px;
            color: #fff;
        }

        #date {
            color: #a0a0a0;
            font-size: 0.85rem;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 3. WIDGET KỸ NĂNG (MARQUEE) */
        .skills-marquee-widget {
            padding: 20px 0;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }

        .skills-marquee-widget::before,
        .skills-marquee-widget::after {
            content: '';
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            z-index: 2;
        }

        .skills-marquee-widget::before {
            left: 0;
            background: linear-gradient(to right, rgba(15, 17, 21, 0.6), transparent);
        }

        .skills-marquee-widget::after {
            right: 0;
            background: linear-gradient(to left, rgba(15, 17, 21, 0.6), transparent);
        }

        .marquee-track {
            display: flex;
            gap: 40px;
            animation: scroll-left 15s linear infinite;
        }

        .skills-marquee-widget:hover .marquee-track {
            animation-play-state: paused;
        }

        .marquee-track i {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .marquee-track i:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .about-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .about-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: 0.3s;
        }

        .about-link:hover {
            background: rgba(47, 77, 73, 0.856);
            color: #fff;
        }

        .music-widget {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: #fff;
        }

        .music-info {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-controls-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap; /* Tránh bị tràn khi màn hình hẹp */
        }

        .main-controls {
            display: flex;
            gap: 12px;
            font-size: 1rem;
            cursor: pointer;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 180px; /* Đảm bảo thanh thời gian không bị co quá nhỏ gây mất chữ */
            font-size: 0.75rem;
            font-family: monospace;
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            background: #444;
            border-radius: 2px;
            appearance: none;
        }

        .music-progress {
            font-family: monospace;
            color: #a0a0a0;
        }

        #progress-bar {
            margin: 5px 0;
            accent-color: rgba(47, 77, 73, 0.856);
        }

        body {
            cursor: default;
        }

        a,
        button,
        .conn-icon,
        .about-link,
        .main-controls i,
        #progress-bar,
        #click-to-play {
            cursor: pointer;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #a0a0a0;
        }

        #volume-slider {
            width: 45px;
            height: 4px;
            cursor: pointer;
            accent-color: rgba(47, 77, 73, 0.856);
        }

        /* Responsive cho điện thoại (Màn hình nhỏ hơn 768px) */
        @media (max-width: 768px) {
            body {
                overflow-y: auto !important;
                align-items: flex-start;
            }

            .container {
                flex-direction: column;
                padding: 10px;
                height: auto; 
            }

            .left-col, .right-col {
                width: 100%;
                flex: none;
            }
            
            .music-widget {
                padding: 12px;
            }

            .music-controls-wrapper {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .progress-container {
                width: 100%; 
                margin-top: 2px;
            }

            .volume-container {
                width: 100%;
                justify-content: space-between; 
            }

            #volume-slider {
                flex: 1;
                width: auto;
            }
        }
        /* ================= BỘ ĐẾM VIEW GÓC DƯỚI TRÁI ================= */
        .view-counter-wrapper {
            position: fixed; /* Ghim cố định trên màn hình */
            bottom: 20px;    /* Cách cạnh dưới 20px */
            left: 20px;      /* Cách cạnh trái 20px */
            z-index: 50;     /* Đảm bảo luôn nổi lên trên cùng */
        }

        .view-counter-small {
            padding: 8px 16px; /* Bo gọn lại một chút cho đẹp */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .vc-title {
            font-size: 0.75rem; /* Thu nhỏ chữ tiêu đề một chút */
            font-weight: 700;
            color: #b5bac1; /* Đổi màu chữ cho giống phần About Me */
            text-transform: uppercase;
        }

        .vc-stats {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.1rem;
            color: #dbdee1;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-weight: bold;
        }
    </style>
</head>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            /* 1. LOGIC ĐỒNG HỒ */
            function updateClock() {
                const now = new Date();
                let hours = now.getHours().toString().padStart(2, '0');
                let minutes = now.getMinutes().toString().padStart(2, '0');
                document.getElementById('time').innerText = `${hours}:${minutes}`;

                const days = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
                const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                document.getElementById('date').innerText = `${days[now.getDay()]} • ${months[now.getMonth()]} ${now.getDate()}`;
            }
            setInterval(updateClock, 1000);
            updateClock();

            /* 2. LOGIC LẤY DATA DISCORD */
            const DISCORD_USER_ID = "756405530960068628";
            async function fetchDiscordProfile() {
                try {
                    const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
                    const { data, success } = await response.json();
                    if (success && data.discord_user.avatar) {
                        document.getElementById('discord-avatar').src = `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/${data.discord_user.avatar}.png?size=512`;
                    }
                    const customStatus = data.activities.find(activity => activity.type === 4);
                    const bubble = document.getElementById('discord-bubble');
                    if (customStatus && bubble) {
                        bubble.innerHTML = customStatus.state || "";
                        bubble.style.display = 'flex';
                    } else if (bubble) { bubble.style.display = 'none'; }
                } catch (error) { console.error("Lỗi Lanyard:", error); }
            }
            fetchDiscordProfile();
            setInterval(fetchDiscordProfile, 5000);

            /* 3. LOGIC HIỆU ỨNG GÕ CHỮ */
            const phrases = ['Striving for success...', '成功を目指して努力する...', 'Trying to get better...', 'より良くしようとしている'];
            let phraseIndex = 0, charIndex = 0, isDeleting = false;
            const textElement = document.getElementById("typewriter-text");
            function typeEffect() {
                const currentPhrase = phrases[phraseIndex];
                textElement.textContent = currentPhrase.substring(0, charIndex);
                if (isDeleting) charIndex--; else charIndex++;
                let typeSpeed = isDeleting ? 50 : 100;
                if (!isDeleting && charIndex === currentPhrase.length) { typeSpeed = 2000; isDeleting = true; }
                else if (isDeleting && charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; typeSpeed = 500; }
                setTimeout(typeEffect, typeSpeed);
            }
            typeEffect();

            /* 4. LOGIC NHẠC NỀN (ĐÃ FIX LỖI CLICK & TỰ CHUYỂN BÀI) */
            const audio = document.getElementById("bg-music");
            const overlay = document.getElementById("click-to-play");
            const songTitle = document.getElementById("song-title");
            const currentTimeEl = document.getElementById("current-time");
            const durationEl = document.getElementById("duration");
            const playPauseBtn = document.getElementById("play-pause-btn");

            const playlist = [
                { title: "Crash Adams - New Heart", file: "./assets/music/Crash Adams - New Heart (Official Lyric Video).mp3" },
                { title: "SƠN TÙNG M-TP | MUỘN RỒI MÀ SAO CÒN", file: "./assets/music/SƠN TÙNG M-TP - MUỘN RỒI MÀ SAO CÒN - OFFICIAL MUSIC VIDEO.mp3" },
                { title: "Low G | In Love (ft. JustaTee)", file: "./assets/music/Low G - In Love (ft. JustaTee) - L2K The Album.mp3" },
                { title: "SON TUNG M-TP | MAKING MY WAY", file: "./assets/music/SON TUNG M-TP - MAKING MY WAY - OFFICIAL VISUALIZER.mp3"},
                { title: "Từng Ngày Yêu Em / buitruonglinh", file: "./assets/music/Từng Ngày Yêu Em - buitruonglinh.mp3" },
                { title: "SON TUNG M-TP x TYGA | COME MY WAY", file: "./assets/music/SON TUNG M-TP x TYGA - COME MY WAY - OFFICIAL MUSIC VIDEO.mp3" },
                { title: "VSTRA - Ai Ngoài Anh", file: "./assets/music/VSTRA - Ai Ngoài Anh (Official Audio).mp3" },
                { title: "SƠN TÙNG M-TP | ĐỪNG LÀM TRÁI TIM ANH ĐAU", file: "./assets/music/SƠN TÙNG M-TP - ĐỪNG LÀM TRÁI TIM ANH ĐAU - OFFICIAL MUSIC VIDEO.mp3" },
                { title: "Dạo Bước HongKong1999", file: "./assets/music/Dạo Bước HongKong1999 (Lời Việt Sát Nghĩa) 漫步香港1999 I NHONHO mơi nhạc.mp3" },
                { title: "Và Thế Giới Đã Mất Đi Một Người Cô Đơn", file: "./assets/music/Và Thế Giới Đã Mất Đi Một Người Cô Đơn.mp3" }
            ];
            let currentSongIndex = Math.floor(Math.random() * playlist.length);

            window.loadSong = function (index) {
                audio.src = playlist[index].file;
                songTitle.innerText = playlist[index].title;
                audio.play();
                playPauseBtn.className = "fa-solid fa-pause";
            };
            // Hàm điều chỉnh âm lượng
            window.changeVolume = function () {
                const volumeSlider = document.getElementById("volume-slider");
                audio.volume = volumeSlider.value; // Gán giá trị thanh trượt vào âm lượng audio
            };

            window.nextSong = function () {
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                loadSong(currentSongIndex);
            };

            window.prevSong = function () {
                currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
                loadSong(currentSongIndex);
            };

            window.togglePlayPause = function () {
                if (audio.paused) { audio.play(); playPauseBtn.className = "fa-solid fa-pause"; }
                else { audio.pause(); playPauseBtn.className = "fa-solid fa-play"; }
            };

            window.seekSong = function () {
                const progressBar = document.getElementById("progress-bar");
                audio.currentTime = (progressBar.value / 100) * audio.duration;
            };

            overlay.addEventListener("click", () => {
                audio.volume = 0.3;
                loadSong(currentSongIndex);
                overlay.style.display = "none";
            });

            audio.addEventListener("ended", nextSong);

            audio.addEventListener("timeupdate", () => {
                const progressBar = document.getElementById("progress-bar");
                if (audio.duration) progressBar.value = (audio.currentTime / audio.duration) * 100;
                const curMin = Math.floor(audio.currentTime / 60);
                const curSec = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
                currentTimeEl.innerText = `${curMin}:${curSec}`;
                const durMin = Math.floor(audio.duration / 60) || 0;
                const durSec = Math.floor(audio.duration % 60).toString().padStart(2, '0');
                durationEl.innerText = `${durMin}:${durSec}`;
            });
        });
        /* =======================================================
               5. HIỆU ỨNG 3D: SỨC NẶNG CON TRỎ CHUỘT
            ======================================================== */
            const cards = document.querySelectorAll('.glass-card');

            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    // Lấy kích thước và vị trí của widget
                    const rect = card.getBoundingClientRect();
                    
                    // Tính toán tọa độ chuột so với tâm của widget
                    const x = e.clientX - rect.left; 
                    const y = e.clientY - rect.top;  
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    // Tính toán góc nghiêng (chia cho 15 để giảm độ gắt của góc)
                    // Chuột ở bên nào thì bên đó sẽ bị đẩy lùi về sau
                    const rotateX = -((y - centerY) / 30);
                    const rotateY = (x - centerX) / 30;

                    // Áp dụng góc nghiêng và thu nhỏ nhẹ (lún xuống)
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
                    // Xóa delay transition để widget bám sát chuột mượt mà hơn
                    card.style.transition = 'transform 0.1s linear, box-shadow 0.4s ease, border 0.4s ease';
                });

                card.addEventListener('mouseleave', () => {
                    // Khi đưa chuột ra ngoài, widget nảy lại vị trí ban đầu
                    card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
                    // Trả lại hiệu ứng transition chậm để tạo độ nảy mượt
                    card.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, border 0.4s ease';
                });
            });
            /* =======================================================
               6. LOGIC BỘ ĐẾM VIEW (Mỗi lần load là +1)
            ======================================================== */
            async function initViewCounter() {
                const counterEl = document.getElementById('view-count');
                try {
                    // /up ở cuối URL có nghĩa là: Gọi API này thì tự động +1 view
                    const response = await fetch('https://api.counterapi.dev/v1/shanksystem_profile/total_visits/up'); 
                    const data = await response.json();
                    
                    if(data.count !== undefined) {
                        counterEl.innerText = Number(data.count).toLocaleString('en-US');
                    }
                } catch (error) {
                    console.error("Lỗi lấy dữ liệu đếm view:", error);
                    counterEl.innerText = "N/A";
                }
            }
            initViewCounter();
    </script>
</body>
